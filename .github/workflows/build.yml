name: Build NP2 Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel source repo'
        required: false
        type: string
        default: 'https://github.com/LineageOS/android_kernel_nothing_sm8475.git'
      kernel_branch:
        description: 'Kernel branch'
        required: false
        type: string
        default: 'lineage-23.2'
      kernel_defconfig:
        description: 'Defconfig(s), space-separated. Use /name if it is in the kernel root; otherwise arch/arm64/configs/name is used.'
        required: false
        type: string
        default: 'gki_defconfig'
      extra_configs:
        description: 'Extra config fragments (space-separated, start with / if it is in the kernel root)'
        required: false
        type: string
        default: 'vendor/waipio_GKI.config vendor/nothing/waipio_GKI.config vendor/debugfs.config'
      susfs_support:
        description: 'Enable SUSFS support'
        required: false
        type: boolean
        default: true
      susfs_branch:
        description: 'SUSFS branch (also selects patch name)'
        required: false
        type: string
        default: 'gki-android13-5.10'
      bbg_support:
        description: 'Enable BBG support'
        required: false
        type: boolean
        default: true
      droidspaces_support:
        description: 'Enable DroidSpaces-OSS support'
        required: false
        type: boolean
        default: false
      susfs_force:
        description: 'Force SUSFS patch apply (ignore failures)'
        required: false
        type: boolean
        default: false
      kernel_type:
        description: 'Kernel type identifier (arter97, NothingOSS, LineageOS)'
        required: false
        type: string
        default: 'LineageOS'

  workflow_call:
    inputs:
      kernel_repo:
        required: false
        type: string
        default: 'https://github.com/LineageOS/android_kernel_nothing_sm8475.git'
      kernel_branch:
        required: false
        type: string
        default: 'lineage-23.2'
      kernel_defconfig:
        description: 'Defconfig(s), space-separated. Use /name if it is in the kernel root; otherwise arch/arm64/configs/name is used.'
        required: false
        type: string
        default: 'gki_defconfig'
      extra_configs:
        required: false
        type: string
        default: 'vendor/waipio_GKI.config vendor/nothing/waipio_GKI.config vendor/debugfs.config'
      susfs_support:
        required: false
        type: boolean
        default: true
      susfs_branch:
        required: false
        type: string
        default: 'gki-android13-5.10'
      bbg_support:
        required: false
        type: boolean
        default: false
      droidspaces_support:
        required: false
        type: boolean
        default: false
      susfs_force:
        required: false
        type: boolean
        default: false
      kernel_type:
        required: false
        type: string
        default: 'LineageOS'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      KERNEL_DIR: kernel
      ANYKERNEL_DIR: AnyKernel3
      DEFCONFIG: ${{ inputs.kernel_defconfig }}
      DEFCONFIG_FRAGS: ${{ inputs.extra_configs }}
      MAKE_ARGS: >-
        ARCH=arm64
        CROSS_COMPILE=aarch64-linux-gnu-
        CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
        LLVM=1 LLVM_IAS=1
        LD=ld.lld HOSTLD=ld.lld
        CC=clang CXX=clang++
        HOSTCC=clang HOSTCXX=clang++
        O=out

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Disk Cleanup
        run: |
          echo "::group::Disk Cleanup"
          echo "Relocating unnecessary software..."
          mkdir -p .background_trash/{1..18}

          safe_mv() {
            if [ -e "$1" ]; then
              sudo mv "$1" "$2"
            fi
          }
          export -f safe_mv

          safe_mv /usr/share/dotnet                  ./.background_trash/1  &
          safe_mv /usr/local/lib/android             ./.background_trash/2  &
          safe_mv /opt/ghc                           ./.background_trash/3  &
          safe_mv /opt/hostedtoolcache/CodeQL        ./.background_trash/4  &
          safe_mv /usr/local/aws-sam-cli             ./.background_trash/5  &
          safe_mv /usr/local/share/chromium          ./.background_trash/6  &
          safe_mv /usr/local/share/powershell        ./.background_trash/7  &
          safe_mv /usr/local/lib/heroku              ./.background_trash/8  &
          safe_mv /usr/local/lib/node_modules        ./.background_trash/9  &
          safe_mv /opt/az                            ./.background_trash/10 &
          safe_mv /opt/microsoft/powershell          ./.background_trash/11 &
          safe_mv /opt/hostedtoolcache/go            ./.background_trash/12 &
          safe_mv /opt/hostedtoolcache/PyPy          ./.background_trash/13 &
          safe_mv /opt/hostedtoolcache/node          ./.background_trash/14 &

          sudo bash -c 'mv /usr/local/bin/aliyun /usr/local/bin/azcopy /usr/local/bin/bicep \
            /usr/local/bin/cmake-gui /usr/local/bin/cpack /usr/local/bin/helm \
            /usr/local/bin/hub /usr/local/bin/kubectl /usr/local/bin/minikube \
            /usr/local/bin/node /usr/local/bin/packer /usr/local/bin/sam \
            /usr/local/bin/stack /usr/local/bin/terraform /usr/local/bin/oc \
            ./.background_trash/15 2>/dev/null || true' &
          sudo bash -c 'mv /usr/local/julia*      ./.background_trash/16 2>/dev/null || true' &
          sudo bash -c 'mv /usr/local/bin/pulumi* ./.background_trash/17 2>/dev/null || true' &
          wait

          echo "Relocation complete. Launching background purge..."
          (
            sudo nice -n 19 ionice -c 3 rm -rf ./.background_trash
            sudo apt-get purge -y firefox google-chrome-stable microsoft-edge-stable >/dev/null 2>&1 || true
            sudo apt-get autoremove -y >/dev/null 2>&1 || true
            sudo apt-get clean >/dev/null 2>&1 || true
            if command -v docker >/dev/null 2>&1; then
              docker rmi $(docker images -q) 2>/dev/null || true
            fi
          ) >/dev/null 2>&1 &
          disown
          echo "::endgroup::"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libelf-dev libssl-dev ccache \
            lz4 zip python3 clang llvm lld gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi wget

      - name: Clone sources
        run: |
          git clone --depth=1 -b "${{ inputs.kernel_branch || 'lineage-23.2' }}" \
            "${{ inputs.kernel_repo || 'https://github.com/LineageOS/android_kernel_nothing_sm8475.git' }}" \
            "$KERNEL_DIR"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git "$ANYKERNEL_DIR"
          rm -rf "$ANYKERNEL_DIR/.git"

      - name: Clone SUSFS
        if: ${{ inputs.susfs_support == true }}
        run: |
          git clone --depth=1 -b "${{ inputs.susfs_branch || 'gki-android13-5.10' }}" \
            https://gitlab.com/simonpunk/susfs4ksu.git

      - name: Setup KernelSU-Next
        run: |
          cd "$KERNEL_DIR"
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -

      - name: Apply SUSFS patches
        if: ${{ inputs.susfs_support == true }}
        run: |
          cd "$KERNEL_DIR"
          cp ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/
          susfs_patch="../susfs4ksu/kernel_patches/50_add_susfs_in_${{ inputs.susfs_branch || 'gki-android13-5.10' }}.patch"
          if [ "${{ inputs.susfs_force }}" = "true" ]; then
            patch -p1 --force < "$susfs_patch" || echo "Continuing despite patch failure"
          else
            patch -p1 < "$susfs_patch"
          fi

      - name: Apply BBG patches
        if: ${{ inputs.bbg_support == true }}
        run: |
          cd "$KERNEL_DIR"
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: DroidSpaces-OSS — Clone
        if: ${{ inputs.droidspaces_support == true }}
        run: |
          git clone --depth=1 https://github.com/ravindu644/Droidspaces-OSS.git

      - name: DroidSpaces-OSS — Apply SYSVIPC kABI fix (5.10)
        if: ${{ inputs.droidspaces_support == true }}
        run: |
          DS_PATCHES="$GITHUB_WORKSPACE/Droidspaces-OSS/Documentation/resources/kernel-patches/GKI/below-kernel-6.12"
          cd "$KERNEL_DIR"
          # Patch 1: SYSVIPC kABI fix (required for 5.10)
          cp "$DS_PATCHES/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch" ./
          patch -p1 < 001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch
          # Patch 2: POSIX_MQUEUE kABI fix (required for 5.10 and below)
          cp "$DS_PATCHES/002.5.10_or_lower_use_android_abi_padding_for_posix_mqueue.patch" ./
          patch -p1 < 002.5.10_or_lower_use_android_abi_padding_for_posix_mqueue.patch

      - name: DroidSpaces-OSS — Write kernel config fragment
        if: ${{ inputs.droidspaces_support == true }}
        run: |
          # GKI-safe config per https://github.com/ravindu644/Droidspaces-OSS/blob/main/Documentation/Kernel-Configuration.md
          # DO NOT add options beyond this list — kABI breakage risk on GKI
          cat > "$KERNEL_DIR/droidspaces.config" <<'EOF'
          # IPC
          CONFIG_SYSVIPC=y
          CONFIG_POSIX_MQUEUE=y
          # Namespaces
          CONFIG_IPC_NS=y
          CONFIG_PID_NS=y
          # HW Access Support
          CONFIG_DEVTMPFS=y
          # Networking (Enhanced NAT support)
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          # Fix for docker unsafe procfs error
          CONFIG_USER_NS=y
          # UFW support
          CONFIG_NETFILTER_XT_TARGET_REJECT=y
          CONFIG_NETFILTER_XT_TARGET_LOG=y
          CONFIG_NETFILTER_XT_MATCH_RECENT=y
          # Fail2ban support
          CONFIG_IP_SET=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_NETFILTER_XT_SET=y
          # NixOS/tmpfs support
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_TMPFS_XATTR=y
          EOF

      - name: Prepare build scripts
        run: |
          chmod +x Scripts/build_kernel.sh
          chmod +x Scripts/package_anykernel.sh

      - name: Enable swap space
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          if sudo fallocate -l 12G /swapfile; then
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile || echo "Swap not permitted on this runner"
          else
            echo "Swap file allocation failed; continuing without swap"
          fi

      - name: Build kernel
        run: |
          SUSFS_SUPPORT="${{ inputs.susfs_support }}" \
          BBG_SUPPORT="${{ inputs.bbg_support }}" \
          Scripts/build_kernel.sh

      - name: Package AnyKernel3
        run: |
          KERNEL_TYPE="${{ inputs.kernel_type || 'LineageOS' }}" Scripts/package_anykernel.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ inputs.kernel_type || 'LineageOS' }}-NP2-KSUNext
          path: "kernel-${{ inputs.kernel_type || 'LineageOS' }}-NP2-KSUNext.zip"
          retention-days: 30

      - name: Upload .config for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: config-NP2-KSUNext
          path: kernel/out/.config
          retention-days: 1

      - name: Collect .rej files
        if: always()
        id: collect_rej
        run: |
          mkdir -p rej
          found=false
          while IFS= read -r -d '' f; do
            found=true
            mkdir -p "rej/$(dirname "$f")"
            cp "$f" "rej/$f"
            orig="${f%.rej}"
            [ -f "$orig" ] && cp "$orig" "rej/$orig"
          done < <(find . -name '*.rej' -print0)
          echo "found=$found" >> "$GITHUB_OUTPUT"

      - name: Upload .rej files
        if: always() && steps.collect_rej.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rej-NP2-KSUNext
          path: rej/
