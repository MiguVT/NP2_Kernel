name: Setup Droidspaces-OSS
description: Clone and apply Droidspaces-OSS patches with version-specific fixes
inputs:
  version:
    description: 'Kernel config version (e.g., android13-5.10)'
    required: true
  android_version:
    description: 'Android version (e.g., android13)'
    required: true
  kernel_version:
    description: 'Kernel version (e.g., 5.10)'
    required: true
  os_patch_level:
    description: 'OS patch level (e.g., 2024-07)'
    required: true
  sublevel:
    description: 'Kernel sublevel'
    required: true

runs:
  using: composite
  steps:
    - name: Download Droidspaces-OSS
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        git clone --depth=1 https://github.com/ravindu644/Droidspaces-OSS.git

    - name: Apply the SYSVIPC kABI fix
      shell: bash
      # Patches apply to the kernel root (single-tree layout, not GKI common/)
      working-directory: ${{ github.workspace }}/kernel
      run: |
        DS_PATCHES="${{ github.workspace }}/Droidspaces-OSS/Documentation/resources/kernel-patches/GKI"
        VERSION="${{ inputs.version }}"

        if [ "$VERSION" = "android16-6.12" ]; then
          patch_file="$DS_PATCHES/kernel-6.12/001.GKI-6.12-or-above-fix_sysvipc_kabi.patch"
          cp "$patch_file" ./
          patch -p1 < "$(basename "$patch_file")"

        elif [ "$VERSION" = "android15-6.6" ] || \
             [ "$VERSION" = "android14-6.1" ] || \
             [ "$VERSION" = "android14-5.15" ] || \
             [ "$VERSION" = "android13-5.15" ]; then
          patch_file="$DS_PATCHES/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch"
          cp "$patch_file" ./
          patch -p1 < "$(basename "$patch_file")"

        elif [ "$VERSION" = "android12-5.10" ] || [ "$VERSION" = "android13-5.10" ]; then
          patch1="$DS_PATCHES/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch"
          patch2="$DS_PATCHES/below-kernel-6.12/002.5.10_or_lower_use_android_abi_padding_for_posix_mqueue.patch"
          cp "$patch1" "$patch2" ./
          patch -p1 < "$(basename "$patch1")"
          patch -p1 < "$(basename "$patch2")"

        else
          echo "No SYSVIPC kABI patch defined for version: $VERSION"
        fi

    - name: Export IPC symbols for module linkage
      shell: bash
      if: inputs.version == 'android16-6.12'
      working-directory: ${{ github.workspace }}/kernel
      run: |
        printf '\nEXPORT_SYMBOL_GPL(put_ipc_ns);\n' >> ipc/namespace.c
        printf '\nEXPORT_SYMBOL_GPL(init_ipc_ns);\n' >> ipc/msgutil.c

    - name: Write DroidSpaces kernel config fragment
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        # Written to a fragment file that build_kernel.sh merges at build time
        cat > "${{ github.workspace }}/kernel/droidspaces.config" <<'EOF'
        CONFIG_PID_NS=y
        CONFIG_SYSVIPC=y
        CONFIG_POSIX_MQUEUE=y
        CONFIG_IPC_NS=y
        CONFIG_DEVTMPFS=y
        CONFIG_BINFMT_MISC=y
        CONFIG_BINFMT_SCRIPT=y
        CONFIG_BINFMT_ELF=y
        EOF
